spring:
  datasource:
    url: jdbc:sqlite:./data/neighbourlink.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.sqlite.hibernate.dialect.SQLiteDialect
    show-sql: false
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 30MB

server:
  port: 8080
  error:
    include-message: always

neighbourlink:
  admin:
    email: admin@neighbourlink.local
    password: admin12345
    full-name: NeighbourLink Admin
    session-key: NEIGHBOURLINK-ADMIN-SESSION-2026
  storage:
    driver-documents-dir: ./data/driver-documents
